<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woodworking AI Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cloudred: '#ef4444',
                        darkbg: '#111111',
                        cardbg: '#1f1f1f'
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased selection:bg-cloudred selection:text-white">

    <!-- Top Navigation Bar -->
    <nav class="w-full border-b border-white/5 bg-[#111]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-8">
                    <div class="flex-shrink-0 flex items-center gap-2">
                        <!-- Logo icon -->
                        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cloudred to-orange-600 flex items-center justify-center shadow-lg shadow-red-500/20">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                        </div>
                        <span class="font-bold text-xl tracking-tight text-white">Woodwork<span class="text-cloudred">AI</span></span>
                    </div>
                    <div class="hidden md:flex space-x-6">
                        <a href="#" class="text-sm font-medium text-neutral-400 hover:text-white transition-colors">Tools</a>
                        <a href="#" class="text-sm font-medium text-neutral-400 hover:text-white transition-colors">API</a>
                        <a href="#" class="text-sm font-medium text-neutral-400 hover:text-white transition-colors">Pricing</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="#" class="text-sm font-medium text-neutral-400 hover:text-white hidden sm:block">Sign in</a>
                    <a href="#" class="text-sm font-medium bg-cloudred hover:bg-red-600 text-white px-4 py-2 rounded-md transition-colors shadow-lg shadow-red-500/20">Sign up</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-4 sm:p-8 w-full max-w-5xl mx-auto mt-8">
        
        <header class="w-full text-center mb-16 mt-12">
            <h1 class="text-5xl sm:text-7xl font-bold text-white tracking-tight mb-6">Link to <span class="text-transparent bg-clip-text bg-gradient-to-r from-cloudred to-orange-500">Premium Plan</span></h1>
            <p class="text-xl text-neutral-400 max-w-3xl mx-auto">
                WoodworkAI automatically extracts woodworking plans from any blog post. Just paste the URL below, and our AI will scrape the text and images to generate your beautifully formatted Word Document.
            </p>
        </header>

        <form id="uploadForm" class="w-full max-w-4xl mx-auto flex flex-col items-center">
            
            <!-- URL Scraper Input (Massive) -->
            <div class="w-full mb-12 flex justify-center group">
                <div class="w-full bg-neutral-800/80 border border-white/10 rounded-2xl p-6 relative hover-glow transition-all duration-300 shadow-2xl backdrop-blur-xl">
                    <div class="flex items-center gap-6">
                        <div class="w-16 h-16 rounded-xl bg-[#111] flex-shrink-0 flex items-center justify-center border border-white/5 group-hover:scale-105 transition-transform">
                            <svg class="w-8 h-8 text-cloudred" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                        </div>
                        <div class="flex-grow">
                            <label for="urlInput" class="block text-sm font-bold text-neutral-500 uppercase tracking-widest mb-2">Project Blog Post URL</label>
                            <input type="url" id="urlInput" placeholder="https://ana-white.com/woodworking-projects/..." required class="w-full bg-transparent border-b-2 border-neutral-700 text-white text-2xl font-light focus:outline-none focus:border-cloudred transition-colors py-2 placeholder-neutral-600">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flex justify-center">
                <button type="submit" id="submitBtn" class="group relative px-8 py-3 bg-cloudred hover:bg-red-600 text-white font-bold rounded-lg transition-all duration-300 flex items-center justify-center text-sm tracking-wide shadow-lg shadow-red-500/20 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="btn-text">Generate Premium Plan</span>
                    <svg class="spinner hidden animate-spin ml-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </form>
        
        <!-- Status Terminal -->
        <div id="statusMessage" class="hidden mt-12 w-full max-w-2xl bg-[#0a0a0a] border border-white/10 rounded-lg p-4 font-mono text-sm shadow-xl">
            <div class="flex items-center gap-2 mb-2 pb-2 border-b border-white/5">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span class="ml-2 text-neutral-500 text-xs">status.log</span>
            </div>
            <p class="status-text text-neutral-300"></p>
        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
